# Ubuntu tmux profile. Keep it bash-friendly and plugin-free.

set -g default-shell "/bin/bash"
set -g default-command "/bin/bash -l"

set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-window-option -g mode-keys vi
set -sg escape-time 0

set-option -g status-position top
set -g status-bg '#1e1e2e'
set -g status-fg '#cdd6f4'
set -g status-left ' '
set -g status-left-length 0
set -g status-right '#H'
set -g status-justify left
set -g window-status-separator " "
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#f9e2af'
set -g window-status-style 'fg=#585b70'
set -g window-status-current-style 'fg=#f9e2af'
set -g window-status-format '#I #W#{?window_zoomed_flag, Z, }'
set -g window-status-current-format '#I #W#{?window_zoomed_flag, Z, }'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind -n C-n break-pane
bind -n C-w kill-pane

bind -n C-"\\" split-window -hc "#{pane_current_path}"
bind -n C-- split-window -vc "#{pane_current_path}"
bind -n C-_ split-window -fvc "#{pane_current_path}"
bind -n C-| split-window -fhc "#{pane_current_path}"

bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5

bind -n C-t new-window -c "#{pane_current_path}"
bind -n C-Left previous-window
bind -n C-Right next-window
bind -n C-] next-window
bind -n C-s choose-tree -Z
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
